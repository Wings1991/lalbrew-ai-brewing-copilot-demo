<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LalBrew AI Brewing Copilot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e9edf2;
display:flex;
justify-content:center;
padding:30px;
}

.phone{
width:390px;
height:780px;
background:white;
border-radius:28px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 25px 60px rgba(0,0,0,0.3);
}

.header{
background:#e53935;
color:white;
text-align:center;
padding:16px;
font-weight:bold;
letter-spacing:1px;
}

.screen{
flex:1;
overflow:auto;
position:relative;
background:#f7f7f7;
}

.menu-item{
display:flex;
align-items:center;
gap:12px;
padding:18px;
border-bottom:1px solid #eee;
font-size:15px;
cursor:pointer;
background:white;
}

.menu-item:hover{
background:#f5f5f5;
}

.ask{
position:absolute;
right:20px;
bottom:20px;
background:#e53935;
color:white;
border:none;
padding:14px 18px;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

.subject-bg{
background:url("https://images.unsplash.com/photo-1514361892635-e955c79c8c23");
background-size:cover;
height:100%;
display:flex;
align-items:center;
justify-content:center;
}

.subject-box{
background:rgba(255,255,255,0.94);
padding:25px;
border-radius:14px;
width:80%;
}

.subject-box select{
width:100%;
padding:10px;
margin-top:10px;
}

.subject-box button{
margin-top:15px;
background:#e53935;
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
}

.chat{
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.row{
display:flex;
}

.user{
justify-content:flex-end;
}

.bot{
justify-content:flex-start;
}

.bubble{
padding:12px;
border-radius:14px;
max-width:75%;
background:#e5e5ea;
}

.user .bubble{
background:#d7d4f2;
}

.quick{
display:flex;
flex-wrap:wrap;
gap:8px;
padding:10px;
background:#f2f2f2;
}

.quick button{
border:none;
background:#e0e0e0;
padding:6px 12px;
border-radius:18px;
cursor:pointer;
}

.card{
background:white;
border-radius:10px;
padding:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
margin-top:10px;
}

.card-title{
font-weight:bold;
}

.card-actions{
margin-top:8px;
display:flex;
gap:8px;
}

.card-actions button{
border:none;
background:#e53935;
color:white;
padding:6px 10px;
border-radius:14px;
font-size:12px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

.toolbox{
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.toolbox input,.toolbox select{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:10px;
}

.input{
display:flex;
padding:10px;
border-top:1px solid #ddd;
background:white;
}

.input input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.send{
margin-left:6px;
background:#e53935;
border:none;
color:white;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
}

.typing{
font-style:italic;
color:#777;
}

.demo{
background:black;
color:white;
border:none;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
margin:10px auto;
display:block;
}

</style>
</head>

<body>

<div class="phone">

<div class="header" id="header">WELCOME</div>

<div class="screen" id="screen"></div>

</div>

<script>

const screen=document.getElementById("screen")
const header=document.getElementById("header")

/* YEAST DATABASE */

const yeastDB=[

{name:"LalBrew Verdant IPA",style:"IPA",flavor:"Fruity esters",temp:"18-22°C"},
{name:"LalBrew BRY-97",style:"IPA",flavor:"Clean American profile",temp:"17-21°C"},
{name:"LalBrew Nottingham",style:"Ale",flavor:"Neutral",temp:"14-21°C"},
{name:"LalBrew Windsor",style:"English Ale",flavor:"Malty",temp:"17-22°C"},
{name:"LalBrew London ESB",style:"British Ale",flavor:"Fruity",temp:"18-23°C"}

]

/* WELCOME */

function welcome(){

screen.innerHTML=`

<div class="menu-item">PRODUCT CATALOG</div>
<div class="menu-item">STRAIN SELECTOR</div>
<div class="menu-item">FIND A DISTRIBUTOR</div>
<div class="menu-item">CALCULATOR: ABV</div>
<div class="menu-item">CALCULATOR: PITCHING RATE</div>
<div class="menu-item">CALCULATOR: CALORIES</div>
<div class="menu-item">CALCULATOR: BOTTLE/CASK CONDITIONING</div>
<div class="menu-item">CALCULATOR: TOTAL TITRATABLE ACIDITY</div>

<button class="ask" onclick="discussion()">+ Ask a question</button>

`

}

/* DISCUSSION */

function discussion(){

header.innerText="DISCUSSION SUBJECT"

screen.innerHTML=`

<div class="subject-bg">

<div class="subject-box">

<p>

Select a topic below to chat with our Lallemand technical support team.

</p>

<select id="topic">

<option>Select Topic</option>
<option>Technical Support</option>
<option>Quotation Request</option>
<option>AI Brewing Copilot ⭐</option>

</select>

<button onclick="submitTopic()">Submit</button>

</div>

</div>

`

}

function submitTopic(){

const topic=document.getElementById("topic").value

if(topic.includes("AI")) copilot()

}

/* COPILOT */

function copilot(){

header.innerText="AI BREWING COPILOT"

screen.innerHTML=`

<div class="chat" id="chat"></div>

<div class="quick">

<button onclick="ask('beer style')">Beer Style Selector</button>
<button onclick="ask('fermentation')">Fermentation Advisor</button>
<button onclick="ask('recommend yeast')">Yeast Recommendation</button>
<button onclick="ask('compare yeast')">Yeast Comparison</button>

</div>

<button class="demo" onclick="runDemo()">▶ Run AI Demo</button>

<div class="input">

<input id="input" placeholder="Ask brewing question...">

<button class="send" onclick="send()">Send</button>

</div>

`

msg("Hello brewer 👋 I'm LalBrew AI Brewing Copilot. Ask me anything about brewing.")

}

/* CHAT */

function msg(text,type="bot"){

const chat=document.getElementById("chat")

chat.innerHTML+=`<div class="row ${type}"><div class="bubble">${text}</div></div>`

chat.scrollTop=chat.scrollHeight

}

/* TYPING */

function showTyping(){

const chat=document.getElementById("chat")

chat.innerHTML+=`<div class="row bot" id="typing"><div class="bubble typing">AI is typing...</div></div>`

chat.scrollTop=chat.scrollHeight

}

function removeTyping(){

const t=document.getElementById("typing")

if(t) t.remove()

}

/* SEND */

function send(){

const input=document.getElementById("input")
const text=input.value

if(!text) return

msg(text,"user")

input.value=""

showTyping()

setTimeout(()=>{

removeTyping()
ai(text)

},1000)

}

function ask(text){

msg(text,"user")

showTyping()

setTimeout(()=>{

removeTyping()
ai(text)

},1000)

}

/* AI */

function ai(text){

text=text.toLowerCase()

if(text.includes("compare")) compare()
else if(text.includes("recommend")) recommend()
else if(text.includes("fermentation")) fermentation()
else if(text.includes("beer")) style()
else msg("I can help with yeast recommendations, fermentation troubleshooting, or beer styles.")

}

/* STYLE */

function style(){

msg(`

<div class="toolbox">

<b>Select Beer Style</b>

<select id="beerStyle">

<option>IPA</option>
<option>American Ale</option>
<option>English Ale</option>
<option>Stout</option>

</select>

<button onclick="findYeast()">Find Yeast</button>

</div>

`)

}

function findYeast(){

let html="<b>Recommended LalBrew Yeasts</b>"

yeastDB.slice(0,3).forEach(y=>{

html+=`

<div class="card">

<div class="card-title">${y.name}</div>

${y.flavor} • ${y.temp}

<div class="card-actions">

<button onclick="alert('Sample request sent')">Request Sample</button>

<button onclick="alert('Opening datasheet')">View Datasheet</button>

</div>

</div>

`

})

msg(html)

}

/* FERMENTATION */

function fermentation(){

msg(`

<div class="toolbox">

<b>Fermentation Analysis</b>

OG
<input id="og" value="1.060">

Temperature
<input id="temp" value="18">

<button onclick="analyze()">Analyze</button>

</div>

`)

}

function analyze(){

msg("Fermentation conditions look normal. Recommended yeast: LalBrew Nottingham.")

}

/* RECOMMEND */

function recommend(){

findYeast()

}

/* COMPARE */

function compare(){

let html="<b>LalBrew Yeast Comparison</b><table>"

html+="<tr><th>Yeast</th><th>Style</th><th>Flavor</th><th>Temp</th></tr>"

yeastDB.forEach(y=>{

html+=`<tr><td>${y.name}</td><td>${y.style}</td><td>${y.flavor}</td><td>${y.temp}</td></tr>`

})

html+="</table>"

msg(html)

}

/* DEMO SCRIPT */

function runDemo(){

ask("recommend yeast for IPA")

setTimeout(()=>ask("compare yeast"),3000)

setTimeout(()=>ask("fermentation issue"),6000)

}

/* START */

welcome()

</script>

</body>
</html>
